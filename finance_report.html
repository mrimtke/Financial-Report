<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>年度収支報告書 - スマホ向けモック</title>
  <style>
    :root{
      --bg:#f3f6f9;
      --panel:#ffffff;
      --line:#d8e0e8;
      --line-strong:#bec9d6;
      --text:#1f2937;
      --sub:#6b7280;
      --accent:#14b8a6;
      --accent-dark:#0f766e;
      --danger:#dc2626;
      --danger-bg:#fee2e2;
      --chip-bg:#eef6ff;
      --chip-text:#1d4ed8;
      --shadow:0 12px 30px rgba(15, 23, 42, 0.08);
      --radius:18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --income:#16a34a;
      --income-soft:#ecfdf3;
      --income-border:#b7e4c7;
      --expense:#dc2626;
      --expense-soft:#fef2f2;
      --expense-border:#fecaca;
      --theme:var(--income);
      --theme-soft:var(--income-soft);
      --theme-border:var(--income-border);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    button, input, select, textarea{
      font:inherit;
    }

    body{
      min-height:100vh;
    }

    .app{
      max-width:520px;
      margin:0 auto;
      padding:calc(var(--safe-top) + 10px) 12px calc(var(--safe-bottom) + 90px);
    }

    .sheet{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .header{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
      border-bottom:1px solid var(--line);
      padding:12px;
    }

    .header-top{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .title-card{
      border:1px solid var(--line-strong);
      border-radius:16px;
      padding:12px;
      background:#fff;
      display:grid;
      gap:8px;
    }

    .title-card .control{
      font-size:1.05rem;
      font-weight:700;
    }

    .screen-title{
      font-size:1rem;
      font-weight:700;
      color:var(--sub);
    }

    .year-row{
      display:grid;
      grid-template-columns:64px 1fr;
      gap:10px;
      align-items:center;
    }

    .year-label{
      font-weight:700;
      color:var(--sub);
      font-size:0.95rem;
    }

    .control{
      width:100%;
      min-height:48px;
      border:1px solid var(--line-strong);
      background:#fff;
      border-radius:14px;
      padding:11px 12px;
      color:var(--text);
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }

    .tab-btn{
      border:1px solid var(--line);
      background:#f4f7fa;
      color:var(--sub);
      border-radius:14px;
      min-height:46px;
      font-weight:800;
      cursor:pointer;
    }

    .tab-btn.active{
      background:#fff;
      color:var(--theme);
      border-color:var(--theme-border);
      box-shadow:inset 0 3px 0 var(--theme);
    }

    .content{
      padding:12px;
    }

    .toolbar{
      display:grid;
      gap:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .label{
      font-size:0.9rem;
      color:var(--sub);
      font-weight:700;
    }

    .summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .summary-card{
      border:1px solid var(--theme-border);
      border-radius:16px;
      background:linear-gradient(180deg, #fff 0%, var(--theme-soft) 100%);
      padding:12px;
    }

    .summary-card .k{
      color:var(--sub);
      font-size:0.82rem;
      font-weight:700;
      margin-bottom:6px;
    }

    .summary-card .v{
      font-size:1.25rem;
      font-weight:800;
      line-height:1.2;
      word-break:break-word;
    }

    .toolbar-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .btn{
      border:none;
      border-radius:14px;
      min-height:48px;
      padding:0 14px;
      cursor:pointer;
      font-weight:800;
    }

    .btn-primary{
      background:var(--theme);
      color:#fff;
    }

    .btn-secondary{
      background:#eef2f7;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-danger{
      background:var(--danger-bg);
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .section-note{
      margin-top:10px;
      font-size:0.84rem;
      color:var(--sub);
      text-align:center;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:14px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .card-main{
      padding:14px;
      display:grid;
      gap:10px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:4px 10px;
      border-radius:999px;
      background:var(--theme-soft);
      color:var(--theme);
      font-size:0.82rem;
      font-weight:700;
      border:1px solid var(--theme-border);
    }

    .meta-title{
      font-size:1.08rem;
      font-weight:800;
      line-height:1.35;
      word-break:break-word;
    }

    .meta-sub{
      color:var(--sub);
      font-size:0.93rem;
      line-height:1.45;
      word-break:break-word;
    }

    .amount-box{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:8px;
      margin-top:4px;
    }

    .amount-label{
      color:var(--sub);
      font-size:0.84rem;
      font-weight:700;
    }

    .amount{
      font-size:1.38rem;
      font-weight:900;
      letter-spacing:0.02em;
      text-align:right;
    }

    .card-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:0 14px 14px;
    }

    .empty{
      border:1px dashed var(--line-strong);
      border-radius:18px;
      padding:28px 16px;
      text-align:center;
      color:var(--sub);
      background:#fafbfd;
      line-height:1.7;
    }

    .floating-add{
      position:fixed;
      right:16px;
      bottom:calc(var(--safe-bottom) + 16px);
      width:60px;
      height:60px;
      border-radius:50%;
      border:none;
      background:var(--theme);
      color:#fff;
      font-size:2rem;
      box-shadow:0 14px 26px rgba(15, 23, 42, 0.20);
      cursor:pointer;
      z-index:40;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(15, 23, 42, 0.5);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:50;
    }

    .overlay.open{ display:flex; }

    .modal{
      width:100%;
      max-width:520px;
      max-height:min(92vh, 860px);
      background:#fff;
      border-radius:24px 24px 0 0;
      overflow:hidden;
      box-shadow:0 18px 40px rgba(15, 23, 42, 0.22);
      display:flex;
      flex-direction:column;
    }

    .modal-head{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:#fff;
    }

    .modal-title{
      font-size:1.08rem;
      font-weight:900;
    }

    .icon-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      background:#eef2f7;
      cursor:pointer;
      font-size:1.12rem;
      flex:0 0 auto;
    }

    .modal-body{
      padding:14px;
      display:grid;
      gap:12px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .modal-foot{
      padding:12px 14px calc(var(--safe-bottom) + 12px);
      border-top:1px solid var(--line);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      background:#fff;
    }

    .hint{
      color:var(--sub);
      font-size:0.82rem;
      line-height:1.5;
    }

    textarea.control{
      min-height:96px;
      resize:vertical;
    }

    .hidden{
      display:none !important;
    }

    .print-preview{
      margin-top:16px;
      border:1px solid var(--line-strong);
      border-radius:18px;
      background:#fff;
      overflow:hidden;
    }

    .print-preview-head{
      padding:12px;
      border-bottom:1px solid var(--line);
      background:#f8fafc;
      display:grid;
      gap:10px;
    }

    .print-preview-title{
      font-size:1.05rem;
      font-weight:900;
    }

    .print-preview-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .print-preview-body{
      padding:16px;
      background:#fff;
    }

    .report-sheet{
      color:#111827;
    }

    .report-header{
      margin-bottom:18px;
    }

    .report-title{
      font-size:1.6rem;
      font-weight:900;
      margin-bottom:6px;
    }

    .report-meta{
      color:#4b5563;
      font-size:0.95rem;
      line-height:1.6;
    }

    .report-summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .report-summary-card{
      border:1px solid #cbd5e1;
      border-radius:12px;
      padding:12px;
      background:#fff;
    }

    .report-summary-label{
      color:#6b7280;
      font-size:0.85rem;
      font-weight:700;
      margin-bottom:6px;
    }

    .report-summary-value{
      font-size:1.3rem;
      font-weight:900;
    }

    .report-section{
      margin-top:20px;
    }

    .report-section-title{
      font-size:1.1rem;
      font-weight:900;
      margin-bottom:10px;
      padding-left:10px;
      border-left:6px solid transparent;
    }

    .report-section-title.income{
      color:#16a34a;
      border-left-color:#16a34a;
    }

    .report-section-title.expense{
      color:#dc2626;
      border-left-color:#dc2626;
    }

    .report-mini-summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .report-badge{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      background:#fff;
      font-size:0.9rem;
      font-weight:700;
    }

    .report-badge.income{
      border-color:#b7e4c7;
      background:#ecfdf3;
      color:#166534;
    }

    .report-badge.expense{
      border-color:#fecaca;
      background:#fef2f2;
      color:#991b1b;
    }

    .report-table-wrap{
      overflow-x:auto;
    }

    .report-table{
      width:100%;
      border-collapse:collapse;
      font-size:0.92rem;
    }

    .report-table th,
    .report-table td{
      border:1px solid #cbd5e1;
      padding:8px;
      vertical-align:top;
      background:#fff;
    }

    .report-table th{
      background:#f8fafc;
      text-align:left;
    }

    .report-table td.amount-cell,
    .report-table th.amount-cell{
      text-align:right;
      white-space:nowrap;
    }

    @media print{
      body{
        background:#fff;
      }

      .header,
      .tabs,
      .toolbar,
      .section-note,
      .list,
      .floating-add,
      .overlay,
      .print-preview-head{
        display:none !important;
      }

      .app{
        max-width:none;
        margin:0;
        padding:0;
      }

      .sheet{
        border:none;
        box-shadow:none;
        border-radius:0;
      }

      .content{
        padding:0;
      }

      #printPreviewSection{
        display:block !important;
        margin:0;
        border:none;
        border-radius:0;
      }

      #printPreviewBody{
        padding:0;
      }

      @page{
        size:A4;
        margin:12mm;
      }
    }

    @media (min-width: 720px){
      .app{
        padding-bottom:24px;
      }

      .toolbar{
        grid-template-columns:1fr auto;
        align-items:end;
      }

      .toolbar-actions{
        margin-top:0;
        width:220px;
      }

      .summary{
        grid-template-columns:repeat(4, 1fr);
      }

      .card-main{
        grid-template-columns:1fr auto;
        align-items:start;
      }

      .amount-box{
        display:block;
        text-align:right;
        margin-top:0;
      }

      .amount-label{
        margin-bottom:6px;
        display:block;
      }

      .modal{
        border-radius:24px;
        margin-bottom:20px;
      }

      .print-preview-actions{
        grid-template-columns:1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sheet">
      <header class="header">
        <div class="header-top">
          <div class="title-card">
            <div class="field">
              <label class="label" for="groupNameInput">団体名</label>
              <input id="groupNameInput" class="control" placeholder="例: リカーズ" />
            </div>
            <div class="screen-title">年度収支報告書</div>
          </div>

          <div class="year-row">
            <div class="year-label">年度</div>
            <select id="yearSelect" class="control" aria-label="年度選択"></select>
          </div>

          <nav class="tabs" aria-label="区分タブ">
            <button class="tab-btn active" data-tab="income" type="button">収入</button>
            <button class="tab-btn" data-tab="expense" type="button">支出</button>
          </nav>
        </div>
      </header>

      <main class="content">
        <section class="toolbar">
          <div class="field">
            <label class="label" for="categoryFilter">項目</label>
            <select id="categoryFilter" class="control"></select>
          </div>

          <div class="toolbar-actions">
            <button id="pdfBtn" class="btn btn-secondary" type="button">PDF化</button>
            <button id="addBtnTop" class="btn btn-primary" type="button">＋追加</button>
          </div>
        </section>

        <section class="summary" id="summaryArea"></section>

        <section class="toolbar" style="margin-top:12px;">
          <div class="toolbar-actions" style="grid-template-columns:1fr 1fr;">
            <button id="exportCsvBtn" class="btn btn-secondary" type="button">出力</button>
            <button id="importCsvBtn" class="btn btn-secondary" type="button">読込</button>
          </div>
          <input id="csvFileInput" type="file" accept=".csv,text/csv" style="display:none" />
          <div class="section-note" id="storageStatus">入力内容はこの端末内に自動保存される。</div>
        </section>

        <div class="section-note">スマホ向けにカード表示を前提としたレイアウト。カテゴリは候補選択と新規入力の両方に対応。</div>

        <section class="list" id="cardList"></section>

        <section id="printPreviewSection" class="print-preview hidden">
          <div class="print-preview-head">
            <div class="print-preview-title">収支報告書プレビュー / PDF</div>
            <div class="print-preview-actions">
              <button id="closePreviewBtn" class="btn btn-secondary" type="button">閉じる</button>
              <button id="execPrintBtn" class="btn btn-secondary" type="button">印刷画面を開く</button>
              <button id="exportPdfBtn" class="btn btn-primary" type="button">PDFを保存</button>
            </div>
          </div>
          <div id="printPreviewBody" class="print-preview-body"></div>
        </section>
      </main>
    </div>
  </div>

  <button class="floating-add" id="addBtnFab" type="button" aria-label="追加">＋</button>

  <div class="overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">新規登録</div>
        <button class="icon-btn" id="closeModalBtn" type="button" aria-label="閉じる">✕</button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label class="label" for="formType">区分</label>
          <select id="formType" class="control">
            <option value="income">収入</option>
            <option value="expense">支出</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="formYear">年度</label>
          <select id="formYear" class="control"></select>
        </div>

        <div class="field">
          <label class="label" for="formCategory">カテゴリ</label>
          <input id="formCategory" class="control" list="categoryCandidates" placeholder="例: 会費" />
          <datalist id="categoryCandidates"></datalist>
          <div class="hint">候補から選択でき、未登録カテゴリはそのまま新規入力できる。</div>
        </div>

        <div class="field">
          <label class="label" for="formName">氏名 / 対象</label>
          <input id="formName" class="control" placeholder="例: 阿部 / 車代" />
        </div>

        <div class="field">
          <label class="label" for="formDate">日付</label>
          <input id="formDate" class="control" type="date" />
        </div>

        <div class="field">
          <label class="label" for="formAmount">金額</label>
          <input id="formAmount" class="control" type="number" inputmode="numeric" min="0" step="1" placeholder="5000" />
        </div>

        <div class="field">
          <label class="label" for="formMemo">詳細 / 備考</label>
          <textarea id="formMemo" class="control" placeholder="例: 区大会費残金"></textarea>
        </div>
      </div>

      <div class="modal-foot">
        <button id="cancelBtn" class="btn btn-secondary" type="button">キャンセル</button>
        <button id="saveBtn" class="btn btn-primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <script>
    const AppConfig = {
      defaultTab: 'income',
      years: [2025, 2026, 2027, 2028]
    };

    const Dom = {
      groupNameInput: document.getElementById('groupNameInput'),
      yearSelect: document.getElementById('yearSelect'),
      categoryFilter: document.getElementById('categoryFilter'),
      summaryArea: document.getElementById('summaryArea'),
      cardList: document.getElementById('cardList'),
      tabButtons: Array.from(document.querySelectorAll('.tab-btn')),
      addBtnTop: document.getElementById('addBtnTop'),
      addBtnFab: document.getElementById('addBtnFab'),
      pdfBtn: document.getElementById('pdfBtn'),
      exportCsvBtn: document.getElementById('exportCsvBtn'),
      importCsvBtn: document.getElementById('importCsvBtn'),
      csvFileInput: document.getElementById('csvFileInput'),
      storageStatus: document.getElementById('storageStatus'),

      modalOverlay: document.getElementById('modalOverlay'),
      modalTitle: document.getElementById('modalTitle'),
      closeModalBtn: document.getElementById('closeModalBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      saveBtn: document.getElementById('saveBtn'),

      formType: document.getElementById('formType'),
      formYear: document.getElementById('formYear'),
      formCategory: document.getElementById('formCategory'),
      formName: document.getElementById('formName'),
      formDate: document.getElementById('formDate'),
      formAmount: document.getElementById('formAmount'),
      formMemo: document.getElementById('formMemo'),
      categoryCandidates: document.getElementById('categoryCandidates')
    };

    const DataStore = (() => {
      const STORAGE_KEY = 'finance-report-mobile-first-v1';
      const defaultItems = [];
      const defaultSettings = {
        groupName: ''
      };

      let sequence = 100;
      let items = [];
      let settings = { ...defaultSettings };

      const clone = value => JSON.parse(JSON.stringify(value));

      function getNextSequence(sourceItems) {
        return sourceItems.reduce((max, x) => Math.max(max, Number(x.id || 0)), 100);
      }

      function loadFromStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            items = clone(defaultItems);
            settings = { ...defaultSettings };
            sequence = getNextSequence(items);
            return { loaded: false, message: '端末保存データはまだない。空の状態で開始した。' };
          }

          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed.items)) {
            throw new Error('保存形式が不正');
          }

          items = clone(parsed.items);
          settings = { ...defaultSettings, ...(parsed.settings || {}) };
          sequence = Number(parsed.sequence || getNextSequence(items));
          return { loaded: true, message: `端末保存データを読込済み（${items.length}件）` };
        } catch (error) {
          items = clone(defaultItems);
          settings = { ...defaultSettings };
          sequence = getNextSequence(items);
          return { loaded: false, message: '保存データの読込に失敗したため空の状態で開始した。' };
        }
      }

      function persist() {
        const payload = {
          sequence,
          items,
          settings,
          savedAt: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        return payload.savedAt;
      }

      loadFromStorage();

      return {
        getStorageKey() {
          return STORAGE_KEY;
        },
        getAll() {
          return clone(items);
        },
        getById(id) {
          return clone(items.find(x => x.id === id) || null);
        },
        save(record) {
          if (record.id == null) {
            record.id = ++sequence;
            items.push(clone(record));
            persist();
            return record.id;
          }
          const index = items.findIndex(x => x.id === record.id);
          if (index >= 0) {
            items[index] = clone(record);
            persist();
            return record.id;
          }
          record.id = ++sequence;
          items.push(clone(record));
          persist();
          return record.id;
        },
        remove(id) {
          items = items.filter(x => x.id !== id);
          persist();
        },
        load() {
          return loadFromStorage();
        },
        persist() {
          return persist();
        },
        getStorageSnapshot() {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        },
        clearStorage() {
          localStorage.removeItem(STORAGE_KEY);
          return loadFromStorage();
        },
        setAll(newItems) {
          items = clone(newItems);
          sequence = getNextSequence(items);
          persist();
          return { count: items.length, savedAt: new Date().toISOString() };
        },
        getSettings() {
          return clone(settings);
        },
        setGroupName(groupName) {
          settings.groupName = String(groupName || '').trim();
          persist();
        }
      };
    })();

    const AppService = (() => {
      const state = {
        selectedTab: AppConfig.defaultTab,
        selectedYear: 2026,
        selectedCategory: 'all',
        editingId: null
      };

      const typeLabelMap = {
        income: '収入',
        expense: '支出'
      };

      function formatCurrency(value) {
        return '¥' + Number(value || 0).toLocaleString('ja-JP');
      }

      function formatDate(value) {
        if (!value) return '-';
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return value;
        return [
          d.getFullYear(),
          String(d.getMonth() + 1).padStart(2, '0'),
          String(d.getDate()).padStart(2, '0')
        ].join('/');
      }

      function normalizeText(value) {
        return String(value || '').trim();
      }

      function getGroupName() {
        return normalizeText(DataStore.getSettings().groupName);
      }

      function setGroupName(value) {
        DataStore.setGroupName(value);
      }

      function getDisplayGroupName() {
        return getGroupName() || '団体名未設定';
      }

      function getFilteredItems() {
        return DataStore.getAll()
          .filter(x => x.type === state.selectedTab)
          .filter(x => x.year === Number(state.selectedYear))
          .filter(x => state.selectedCategory === 'all' ? true : x.category === state.selectedCategory)
          .sort((a, b) => (a.date < b.date ? 1 : -1));
      }

      function getCategoriesByTabAndYear(tab, year) {
        const categories = DataStore.getAll()
          .filter(x => x.type === tab)
          .filter(x => x.year === Number(year))
          .map(x => x.category)
          .filter(Boolean);

        return Array.from(new Set(categories)).sort((a, b) => a.localeCompare(b, 'ja'));
      }

      function getAllCategories() {
        const categories = DataStore.getAll().map(x => x.category).filter(Boolean);
        return Array.from(new Set(categories)).sort((a, b) => a.localeCompare(b, 'ja'));
      }

      function getSummary(items) {
        const total = items.reduce((sum, x) => sum + Number(x.amount || 0), 0);
        const count = items.length;
        const average = count === 0 ? 0 : Math.round(total / count);
        const latest = items[0]?.date || '';
        return { total, count, average, latest };

        if (!normalizeText(model.date)) return '日付を入力してください。';
        if (Number(model.amount) < 0 || normalizeText(model.amount) === '') return '金額を正しく入力してください。';

      function setFormFromModel(model) {

      function formatDateTime(value) {

        formatDate,

        getDisplayGroupName,
        setGroupName,
        getFilteredItems,
        getCategoriesByTabAndYear,

    const CsvService = (() => {
      const headers = ['id', 'year', 'type', 'category', 'name', 'date', 'amount', 'memo'];

      function escapeCsv(value) {
        const text = String(value ?? '');
        if (/[",\n\r]/.test(text)) {
          return '"' + text.replace(/"/g, '""') + '"';
        }
        return text;
      }

      function buildCsvText(items) {
        const lines = [
          headers.join(','),
          ...items.map(item => headers.map(key => escapeCsv(item[key])).join(','))
        ];
        return "\ufeff" + lines.join('\r\n');
      }

      function buildExportFileName() {
        const groupName = AppService.getGroupName() || '団体名未設定';
        return `${groupName}収支報告書.csv`;
      }

      function extractGroupNameFromFileName(fileName) {
        const baseName = String(fileName || '').replace(/\.[^.]+$/, '');
        const match = baseName.match(/^(.*)収支報告書$/);
        return match ? match[1].trim() : '';
      }

      function downloadCsv() {
        const items = DataStore.getAll().sort((a, b) => Number(a.id) - Number(b.id));
        const csvText = buildCsvText(items);
        const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = buildExportFileName();
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      function parseCsvLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          const next = line[i + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            result.push(current);
            current = '';
          } else {
            current += char;
          }
        }

        result.push(current);
        return result;
      }

      function parseCsvText(text) {
        const normalized = text.replace(/^\ufeff/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        const lines = normalized.split('\n').filter(line => line.trim() !== '');
        if (lines.length === 0) {
          return [];
        }

        const headerRow = parseCsvLine(lines[0]).map(x => x.trim());
        if (headerRow.join(',') !== headers.join(',')) {
          throw new Error('CSVヘッダーが不正。必要列: ' + headers.join(','));
        }

        return lines.slice(1).map((line, index) => {
          const cols = parseCsvLine(line);
          if (cols.length !== headers.length) {
            throw new Error(`${index + 2}行目の列数が不正`);
          }

          const row = Object.fromEntries(headers.map((key, i) => [key, cols[i]]));
          const id = Number(row.id);
          const year = Number(row.year);
          const amount = Number(row.amount);
          const type = String(row.type || '').trim();

          if (!['income', 'expense'].includes(type)) {
            throw new Error(`${index + 2}行目の区分は income または expense で入力`);
          }
          if (!Number.isFinite(id) || !Number.isFinite(year) || !Number.isFinite(amount)) {
            throw new Error(`${index + 2}行目の id/year/amount が不正`);
          }

          return {
            id,
            year,
            type,
            category: String(row.category || '').trim(),
            name: String(row.name || '').trim(),
            date: String(row.date || '').trim(),
            amount,
            memo: String(row.memo || '').trim()
          };
        });
      }

      async function importFromFile(file) {
        const text = await file.text();
        return parseCsvText(text);
      }

      return {
        downloadCsv,
        importFromFile,
        extractGroupNameFromFileName
      };
    })();


    const PdfService = (() => {
      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function getReportData() {
        const allItems = DataStore.getAll()
          .filter(x => x.year === Number(AppService.state.selectedYear));

        const incomeItems = allItems
          .filter(x => x.type === 'income')
          .sort((a, b) => (a.date > b.date ? 1 : -1));

        const expenseItems = allItems
          .filter(x => x.type === 'expense')
          .sort((a, b) => (a.date > b.date ? 1 : -1));

        return {
          groupName: AppService.getDisplayGroupName(),
          year: AppService.state.selectedYear,
          createdDate: AppService.formatDate(new Date().toISOString()),
          incomeItems,
          expenseItems,
          incomeSummary: AppService.getSummary(incomeItems),
          expenseSummary: AppService.getSummary(expenseItems)
        };
      }

      function buildRows(items) {
        if (!items.length) {
          return '<tr><td colspan="4" style="text-align:center; color:#666;">データなし</td></tr>';
        }

        return items.map(item => `
          <tr>
            <td>${escapeHtml(item.category)}</td>
            <td>${escapeHtml(item.name)}</td>
            <td>${escapeHtml(AppService.formatDate(item.date))}</td>
            <td class="amount-cell">${escapeHtml(AppService.formatCurrency(item.amount))}</td>
          </tr>
        `).join('');
      }

      function buildSection(title, key, items) {
        const summary = AppService.getSummary(items);
        const themeClass = key === 'income' ? 'income' : 'expense';

        return `
          <section class="report-section">
            <div class="report-section-title ${themeClass}">${title}</div>
            <div class="report-mini-summary">
              <div class="report-badge ${themeClass}">合計 ${escapeHtml(AppService.formatCurrency(summary.total))}</div>
              <div class="report-badge">最新日付 ${escapeHtml(summary.latest ? AppService.formatDate(summary.latest) : '-')}</div>
            </div>
            <div class="report-table-wrap">
              <table class="report-table">
                <thead>
                  <tr>
                    <th>項目</th>
                    <th>氏名 / 対象</th>
                    <th>日付</th>
                    <th class="amount-cell">金額</th>
                  </tr>
                </thead>
                <tbody>
                  ${buildRows(items)}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function buildPreviewHtml() {
        const report = getReportData();

        return `
          <div class="report-sheet">
            <header class="report-header">
              <div class="report-title">${escapeHtml(report.groupName)} 収支報告書</div>
              <div class="report-meta">年度: ${escapeHtml(String(report.year))}</div>
              <div class="report-meta">作成日: ${escapeHtml(report.createdDate)}</div>

              <div class="report-summary">
                <div class="report-summary-card">
                  <div class="report-summary-label">収入合計</div>
                  <div class="report-summary-value" style="color:#16a34a;">${escapeHtml(AppService.formatCurrency(report.incomeSummary.total))}</div>
                </div>
                <div class="report-summary-card">
                  <div class="report-summary-label">支出合計</div>
                  <div class="report-summary-value" style="color:#dc2626;">${escapeHtml(AppService.formatCurrency(report.expenseSummary.total))}</div>
                </div>
              </div>
            </header>

            ${buildSection('収入', 'income', report.incomeItems)}
            ${buildSection('支出', 'expense', report.expenseItems)}
          </div>
        `;
      }

      function openPreview() {
        Dom.printPreviewBody.innerHTML = buildPreviewHtml();
        Dom.printPreviewSection.classList.remove('hidden');
        Dom.printPreviewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function closePreview() {
        Dom.printPreviewSection.classList.add('hidden');
      }

      function executePrint() {
        if (Dom.printPreviewSection.classList.contains('hidden')) {
          openPreview();
        }
        setTimeout(() => window.print(), 50);
      }

      function getPdfFileName() {
        return `${AppService.getDisplayGroupName()}収支報告書.pdf`;
      }

      function isIOSLike() {
        const ua = navigator.userAgent || '';
        const platform = navigator.platform || '';
        return /iPad|iPhone|iPod/.test(ua) ||
          (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      }

      function ensurePdfLib() {
        return !!(window.jspdf && window.jspdf.jsPDF && window.jspdf.jsPDF.API);
      }

      function buildTableBody(items) {
        if (!items.length) {
          return [['', 'データなし', '', '']];
        }
        return items.map(item => [
          item.category || '',
          item.name || '',
          AppService.formatDate(item.date),
          AppService.formatCurrency(item.amount)
        ]);
      }

      function drawTable(doc, startY, title, items, themeColor) {
        doc.setFontSize(15);
        doc.setTextColor(themeColor[0], themeColor[1], themeColor[2]);
        doc.text(title, 14, startY);
        const summary = AppService.getSummary(items);
        doc.setFontSize(10);
        doc.setTextColor(60, 60, 60);
        doc.text(`合計: ${AppService.formatCurrency(summary.total)}    最新日付: ${summary.latest ? AppService.formatDate(summary.latest) : '-'}`, 14, startY + 6);

        doc.autoTable({
          startY: startY + 10,
          head: [['項目', '氏名 / 対象', '日付', '金額']],
          body: buildTableBody(items),
          theme: 'grid',
          styles: { fontSize: 10, cellPadding: 2.5, lineColor: [203, 213, 225] },
          headStyles: { fillColor: [248, 250, 252], textColor: [31, 41, 55] },
          alternateRowStyles: { fillColor: [255, 255, 255] },
          columnStyles: {
            3: { halign: 'right' }
          },
          margin: { left: 14, right: 14 }
        });

        return doc.lastAutoTable.finalY + 12;
      }

      function generatePdfDocument() {
        if (!ensurePdfLib()) {
          throw new Error('PDFライブラリの読込に失敗した。通信環境を確認してもう一度試してください。');
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
        const report = getReportData();

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.setTextColor(17, 24, 39);
        doc.text(`${report.groupName} 収支報告書`, 14, 18);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(11);
        doc.text(`年度: ${report.year}`, 14, 26);
        doc.text(`作成日: ${report.createdDate}`, 14, 32);

        doc.setDrawColor(203, 213, 225);
        doc.roundedRect(14, 38, 88, 20, 2, 2);
        doc.roundedRect(108, 38, 88, 20, 2, 2);

        doc.setFontSize(10);
        doc.setTextColor(107, 114, 128);
        doc.text('収入合計', 18, 45);
        doc.text('支出合計', 112, 45);

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(16);
        doc.setTextColor(22, 163, 74);
        doc.text(AppService.formatCurrency(report.incomeSummary.total), 18, 53);
        doc.setTextColor(220, 38, 38);
        doc.text(AppService.formatCurrency(report.expenseSummary.total), 112, 53);

        doc.setTextColor(17, 24, 39);
        let currentY = 68;
        currentY = drawTable(doc, currentY, '収入', report.incomeItems, [22, 163, 74]);

        if (currentY > 230) {
          doc.addPage();
          currentY = 18;
        }

        drawTable(doc, currentY, '支出', report.expenseItems, [220, 38, 38]);
        return doc;
      }

      async function exportPdf() {
        try {
          const doc = generatePdfDocument();
          const fileName = getPdfFileName();

          if (isIOSLike()) {
            const blobUrl = doc.output('bloburl');
            const win = window.open(blobUrl, '_blank');
            if (!win) {
              alert('PDFを開けなかった。ポップアップブロックを確認してください。');
              return;
            }
            alert('PDFを別タブで開いた。共有メニューから「ファイルに保存」を選ぶと保存できる。');
            return;
          }

          doc.save(fileName);
        } catch (error) {
          alert(error.message || 'PDF化に失敗した。');
        }
      }

      return { openPreview, closePreview, executePrint, exportPdf };
    })();

        close();
        UiRenderer.renderAll('保存した内容を画面へ反映済み');
      }

      return { openNew, openEdit, close, save };
    })();

    const EventBinder = (() => {
      function bind() {
        Dom.tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            AppService.state.selectedTab = btn.dataset.tab;
            AppService.state.selectedCategory = 'all';
            UiRenderer.renderAll('保存した内容を画面へ反映済み');
          });
        });

        Dom.groupNameInput.addEventListener('change', e => {
          AppService.setGroupName(e.target.value);
          UiRenderer.renderAll('団体名を端末保存へ反映済み');
        });

        Dom.yearSelect.addEventListener('change', e => {
          AppService.state.selectedYear = Number(e.target.value);
          AppService.state.selectedCategory = 'all';
          UiRenderer.renderAll('保存した内容を画面へ反映済み');
        });

        Dom.categoryFilter.addEventListener('change', e => {
          AppService.state.selectedCategory = e.target.value;
          UiRenderer.renderAll('保存した内容を画面へ反映済み');
        });

        Dom.addBtnTop.addEventListener('click', ModalController.openNew);
        Dom.addBtnFab.addEventListener('click', ModalController.openNew);
        Dom.closeModalBtn.addEventListener('click', ModalController.close);
        Dom.cancelBtn.addEventListener('click', ModalController.close);
        Dom.saveBtn.addEventListener('click', ModalController.save);

        Dom.pdfBtn.addEventListener('click', () => {
          PdfService.openPreview();
        });

        Dom.closePreviewBtn.addEventListener('click', () => {
          PdfService.closePreview();
        });

        Dom.execPrintBtn.addEventListener('click', () => {
          PdfService.executePrint();
        });

        Dom.exportPdfBtn.addEventListener('click', () => {
          PdfService.exportPdf();
        });


        Dom.exportCsvBtn.addEventListener('click', () => {
          CsvService.downloadCsv();
          UiRenderer.updateStorageStatus('出力ファイルを作成した');
        });

        Dom.importCsvBtn.addEventListener('click', () => {
          Dom.csvFileInput.value = '';
          Dom.csvFileInput.click();
        });

        Dom.csvFileInput.addEventListener('change', async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;

          try {
            const items = await CsvService.importFromFile(file);
            DataStore.setAll(items);

            const importedGroupName = CsvService.extractGroupNameFromFileName(file.name);
            if (importedGroupName) {
              AppService.setGroupName(importedGroupName);
            }

            const message = importedGroupName
              ? `CSVを読込して ${items.length}件 を反映した / 団体名: ${importedGroupName}`
              : `CSVを読込して ${items.length}件 を反映した`;
            UiRenderer.renderAll(message);
            alert(message);
          } catch (error) {
            alert('読込に失敗した。\n' + error.message);
          }
        });

        Dom.modalOverlay.addEventListener('click', e => {
          if (e.target === Dom.modalOverlay) ModalController.close();
        });

        Dom.cardList.addEventListener('click', e => {
          const editButton = e.target.closest('[data-edit-id]');
          if (editButton) {
            ModalController.openEdit(Number(editButton.dataset.editId));
            return;
          }

          const deleteButton = e.target.closest('[data-delete-id]');
          if (deleteButton) {
            const id = Number(deleteButton.dataset.deleteId);
            if (confirm('このデータを削除しますか？')) {
              DataStore.remove(id);
              UiRenderer.renderAll('保存した内容を画面へ反映済み');
            }
          }
        });

        document.addEventListener('keydown', e => {
          if (e.key === 'Escape' && Dom.modalOverlay.classList.contains('open')) {
            ModalController.close();
          }
        });
      }

      return { bind };
    })();

    const initialLoad = DataStore.load();
    UiRenderer.renderAll(initialLoad.message);
    EventBinder.bind();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</body>
</html>
