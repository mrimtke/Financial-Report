
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>収支報告</title>

<style>
body{font-family:sans-serif;margin:20px;}
.card{border:1px solid #ccc;padding:10px;margin-bottom:10px;border-radius:6px;}
button{margin-left:5px;}
</style>

</head>
<body>

<h2>収支入力</h2>

<form id="entryForm">
年 <input id="year" type="number" required>
月 <input id="month" type="number" min="1" max="12" required>
内容 <input id="title" required>
金額 <input id="amount" type="number" required>
<button type="submit">追加</button>
</form>

<h2>カード一覧</h2>
<div id="cardList"></div>

<script src="finance_report_app.js"></script>

</body>
</html>
