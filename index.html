<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>年度収支報告書</title>
  <style>
    :root{
      --bg:#f3f6f9;
      --panel:#ffffff;
      --line:#d8e0e8;
      --line-strong:#bec9d6;
      --text:#1f2937;
      --sub:#6b7280;
      --danger:#dc2626;
      --danger-bg:#fee2e2;
      --shadow:0 12px 30px rgba(15, 23, 42, 0.08);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --income:#16a34a;
      --income-soft:#ecfdf3;
      --income-border:#b7e4c7;
      --expense:#dc2626;
      --expense-soft:#fef2f2;
      --expense-border:#fecaca;
      --theme:var(--income);
      --theme-soft:var(--income-soft);
      --theme-border:var(--income-border);
    }

    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    button, input, select, textarea{ font:inherit; }
    body{ min-height:100vh; }

    .app{
      max-width:520px;
      margin:0 auto;
      padding:calc(var(--safe-top) + 10px) 12px calc(var(--safe-bottom) + 90px);
    }
    .sheet{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .header{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
      border-bottom:1px solid var(--line);
      padding:12px;
    }
    .header-top{ display:flex; flex-direction:column; gap:10px; }
    .title-card{
      border:1px solid var(--line-strong);
      border-radius:16px;
      padding:12px;
      background:#fff;
      display:grid;
      gap:8px;
    }
    .title-card .control{ font-size:1.05rem; font-weight:700; }
    .screen-title{ font-size:1rem; font-weight:700; color:var(--sub); }
    .year-row{ display:grid; grid-template-columns:64px 1fr; gap:10px; align-items:center; }
    .year-label{ font-weight:700; color:var(--sub); font-size:0.95rem; }
    .control{
      width:100%;
      min-height:48px;
      border:1px solid var(--line-strong);
      background:#fff;
      border-radius:14px;
      padding:11px 12px;
      color:var(--text);
    }
    .tabs{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .tab-btn{
      border:1px solid var(--line);
      background:#f4f7fa;
      color:var(--sub);
      border-radius:14px;
      min-height:46px;
      font-weight:800;
      cursor:pointer;
    }
    .tab-btn.active{
      background:#fff;
      color:var(--theme);
      border-color:var(--theme-border);
      box-shadow:inset 0 3px 0 var(--theme);
    }
    .content{ padding:12px; }
    .toolbar{ display:grid; gap:10px; }
    .field{ display:flex; flex-direction:column; gap:6px; }
    .label{ font-size:0.9rem; color:var(--sub); font-weight:700; }
    .summary{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .summary-card{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:12px;
    }
    .summary-card.income{
      border-color:var(--income-border);
      background:linear-gradient(180deg, #fff 0%, var(--income-soft) 100%);
    }
    .summary-card.expense{
      border-color:var(--expense-border);
      background:linear-gradient(180deg, #fff 0%, var(--expense-soft) 100%);
    }
    .summary-card .k{ color:var(--sub); font-size:0.82rem; font-weight:700; margin-bottom:6px; }
    .summary-card .v{ font-size:1.25rem; font-weight:800; line-height:1.2; word-break:break-word; }
    .toolbar-actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .btn{
      border:none;
      border-radius:14px;
      min-height:48px;
      padding:0 14px;
      cursor:pointer;
      font-weight:800;
    }
    .btn-primary{ background:var(--theme); color:#fff; }
    .btn-secondary{ background:#eef2f7; color:var(--text); border:1px solid var(--line); }
    .btn-danger{ background:var(--danger-bg); color:var(--danger); border:1px solid #fecaca; }
    .section-note{ margin-top:10px; font-size:0.84rem; color:var(--sub); text-align:center; }
    .list{ display:flex; flex-direction:column; gap:12px; margin-top:14px; }
    .card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(15, 23, 42, 0.04);
    }
    .card-main{ padding:14px; display:grid; gap:10px; }
    .chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
    .chip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:4px 10px;
      border-radius:999px;
      background:var(--theme-soft);
      color:var(--theme);
      font-size:0.82rem;
      font-weight:700;
      border:1px solid var(--theme-border);
    }
    .meta-title{ font-size:1.08rem; font-weight:800; line-height:1.35; word-break:break-word; }
    .meta-sub{ color:var(--sub); font-size:0.93rem; line-height:1.45; word-break:break-word; }
    .amount-box{ display:flex; justify-content:space-between; align-items:end; gap:8px; margin-top:4px; }
    .amount-label{ color:var(--sub); font-size:0.84rem; font-weight:700; }
    .amount{ font-size:1.38rem; font-weight:900; letter-spacing:0.02em; text-align:right; }
    .card-actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 14px 14px; }
    .empty{
      border:1px dashed var(--line-strong);
      border-radius:18px;
      padding:28px 16px;
      text-align:center;
      color:var(--sub);
      background:#fafbfd;
      line-height:1.7;
    }
    .floating-add{
      position:fixed;
      right:16px;
      bottom:calc(var(--safe-bottom) + 16px);
      width:60px;
      height:60px;
      border-radius:50%;
      border:none;
      background:var(--theme);
      color:#fff;
      font-size:2rem;
      box-shadow:0 14px 26px rgba(15, 23, 42, 0.20);
      cursor:pointer;
      z-index:40;
    }
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(15, 23, 42, 0.5);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:50;
    }
    .overlay.open{ display:flex; }
    .modal{
      width:100%;
      max-width:520px;
      max-height:min(92vh, 860px);
      background:#fff;
      border-radius:24px 24px 0 0;
      overflow:hidden;
      box-shadow:0 18px 40px rgba(15, 23, 42, 0.22);
      display:flex;
      flex-direction:column;
    }
    .modal-head{ padding:12px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:10px; background:#fff; }
    .modal-title{ font-size:1.08rem; font-weight:900; }
    .icon-btn{ width:42px; height:42px; border:none; border-radius:12px; background:#eef2f7; cursor:pointer; font-size:1.12rem; flex:0 0 auto; }
    .modal-body{ padding:14px; display:grid; gap:12px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .modal-foot{ padding:12px 14px calc(var(--safe-bottom) + 12px); border-top:1px solid var(--line); display:grid; grid-template-columns:1fr 1fr; gap:10px; background:#fff; }
    .hint{ color:var(--sub); font-size:0.82rem; line-height:1.5; }
    textarea.control{ min-height:96px; resize:vertical; }
    .hidden{ display:none !important; }
    .print-preview{ margin-top:16px; border:1px solid var(--line-strong); border-radius:18px; background:#fff; overflow:hidden; }
    .print-preview-body{ padding:16px; background:#fff; }
    .report-sheet{ color:#111827; }
    .report-header{ margin-bottom:18px; }
    .report-title{ font-size:1.6rem; font-weight:900; margin-bottom:6px; }
    .report-meta{ color:#4b5563; font-size:0.95rem; line-height:1.6; }
    .report-summary{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .report-summary-card{ border:1px solid #cbd5e1; border-radius:12px; padding:12px; background:#fff; }
    .report-summary-label{ color:#6b7280; font-size:0.85rem; font-weight:700; margin-bottom:6px; }
    .report-summary-value{ font-size:1.3rem; font-weight:900; }
    .report-section{ margin-top:20px; }
    .report-section-title{ font-size:1.1rem; font-weight:900; margin-bottom:10px; padding-left:10px; border-left:6px solid transparent; }
    .report-section-title.income{ color:#16a34a; border-left-color:#16a34a; }
    .report-section-title.expense{ color:#dc2626; border-left-color:#dc2626; }
    .report-mini-summary{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .report-badge{ padding:8px 10px; border-radius:10px; border:1px solid #cbd5e1; background:#fff; font-size:0.9rem; font-weight:700; }
    .report-badge.income{ border-color:#b7e4c7; background:#ecfdf3; color:#166534; }
    .report-badge.expense{ border-color:#fecaca; background:#fef2f2; color:#991b1b; }
    .report-table-wrap{ overflow-x:auto; }
    .report-table{ width:100%; border-collapse:collapse; font-size:0.92rem; }
    .report-table th, .report-table td{ border:1px solid #cbd5e1; padding:8px; vertical-align:top; background:#fff; }
    .report-table th{ background:#f8fafc; text-align:left; }
    .report-table td.amount-cell, .report-table th.amount-cell{ text-align:right; white-space:nowrap; }

    @media print{
      body{ background:#fff; }
      .header,.tabs,.toolbar,.section-note,.list,.floating-add,.overlay{ display:none !important; }
      .app{ max-width:none; margin:0; padding:0; }
      .sheet{ border:none; box-shadow:none; border-radius:0; }
      .content{ padding:0; }
      #printPreviewSection{ display:block !important; margin:0; border:none; border-radius:0; }
      #printPreviewBody{ padding:0; }
      @page{ size:A4; margin:12mm; }
    }

    @media (min-width: 720px){
      .app{ padding-bottom:24px; }
      .toolbar{ grid-template-columns:1fr 1fr; align-items:end; }
      .toolbar-actions{ margin-top:0; }
      .summary{ grid-template-columns:repeat(2, 1fr); }
      .card-main{ grid-template-columns:1fr auto; align-items:start; }
      .amount-box{ display:block; text-align:right; margin-top:0; }
      .amount-label{ margin-bottom:6px; display:block; }
      .modal{ border-radius:24px; margin-bottom:20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sheet">
      <header class="header">
        <div class="header-top">
          <div class="title-card">
            <div class="field">
              <label class="label" for="groupNameInput">団体名</label>
              <input id="groupNameInput" class="control" placeholder="例: リカーズ" />
            </div>
            <div class="screen-title">年度収支報告書</div>
          </div>

          <div class="year-row">
            <div class="year-label">年度</div>
            <select id="yearSelect" class="control" aria-label="年度選択"></select>
          </div>

          <nav class="tabs" aria-label="区分タブ">
            <button class="tab-btn active" data-tab="income" type="button">収入</button>
            <button class="tab-btn" data-tab="expense" type="button">支出</button>
          </nav>
        </div>
      </header>

      <main class="content">
        <section class="toolbar">
          <div class="field">
            <label class="label" for="categoryFilter">項目</label>
            <select id="categoryFilter" class="control"></select>
          </div>

          <div class="field">
            <label class="label" for="sortFieldSelect">並び替え</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <select id="sortFieldSelect" class="control">
                <option value="date">日付</option>
                <option value="category">項目</option>
                <option value="name">氏名 / 対象</option>
                <option value="amount">金額</option>
                <option value="memo">詳細</option>
              </select>
              <select id="sortDirectionSelect" class="control">
                <option value="asc">昇順</option>
                <option value="desc" selected>降順</option>
              </select>
            </div>
          </div>
        </section>

        <section class="summary" id="summaryArea"></section>

        <section class="toolbar" style="margin-top:12px;">
          <div class="toolbar-actions" style="grid-template-columns:1fr 1fr;">
            <button id="pdfBtn" class="btn btn-secondary" type="button">PDF</button>
            <button id="addBtnTop" class="btn btn-primary" type="button">＋追加</button>
          </div>
          <div class="toolbar-actions" style="grid-template-columns:1fr 1fr;">
            <button id="exportCsvBtn" class="btn btn-secondary" type="button">出力</button>
            <button id="importCsvBtn" class="btn btn-secondary" type="button">読込</button>
          </div>
          <input id="csvFileInput" type="file" accept=".csv,text/csv" style="display:none" />
          <div class="section-note" id="storageStatus">入力内容はこの端末内に自動保存される。</div>
        </section>

        <div class="section-note">スマホ向けにカード表示を前提としたレイアウト。カテゴリは候補選択と新規入力の両方に対応。</div>

        <section class="list" id="cardList"></section>

        <section id="printPreviewSection" class="print-preview hidden">
          <div id="printPreviewBody" class="print-preview-body"></div>
        </section>
      </main>
    </div>
  </div>

  <button class="floating-add" id="addBtnFab" type="button" aria-label="追加">＋</button>

  <div class="overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">新規登録</div>
        <button class="icon-btn" id="closeModalBtn" type="button" aria-label="閉じる">✕</button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label class="label" for="formType">区分</label>
          <select id="formType" class="control">
            <option value="income">収入</option>
            <option value="expense">支出</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="formYear">年度</label>
          <select id="formYear" class="control"></select>
        </div>

        <div class="field">
          <label class="label" for="formCategory">カテゴリ</label>
          <input id="formCategory" class="control" list="categoryCandidates" placeholder="例: 会費" />
          <datalist id="categoryCandidates"></datalist>
          <div class="hint">候補から選択でき、未登録カテゴリはそのまま新規入力できる。</div>
        </div>

        <div class="field">
          <label class="label" for="formName">氏名 / 対象</label>
          <input id="formName" class="control" placeholder="例: 阿部 / 車代" />
        </div>

        <div class="field">
          <label class="label" for="formDate">日付</label>
          <input id="formDate" class="control" type="date" />
        </div>

        <div class="field">
          <label class="label" for="formAmount">金額</label>
          <input id="formAmount" class="control" type="number" inputmode="numeric" min="0" step="1" placeholder="5000" />
        </div>

        <div class="field">
          <label class="label" for="formMemo">詳細 / 備考</label>
          <textarea id="formMemo" class="control" placeholder="例: 区大会費残金"></textarea>
        </div>
      </div>

      <div class="modal-foot">
        <button id="cancelBtn" class="btn btn-secondary" type="button">キャンセル</button>
        <button id="saveBtn" class="btn btn-primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <script src="finance_report_app.js"></script>
</body>
</html>
